<!--Profile Card UI-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>
    <!--CSS-->
    <link rel="stylesheet" href="profile-style.css">
    <!--Boxicons-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="cat.jpeg" alt="" class="profile-img">
        </div>
        <div class="text-data">
            <span class="name">Ishan Singh</span>
            <span class="job">Student</span>
        </div>
        <div class="media-buttons">
            <a href="https://instagram.com" class="link"><box-icon name='instagram' type='logo'></box-icon></a>
            <a href="https://github.com" class="link"><box-icon name='github' type='logo'></box-icon></a>
            <a href="https://facebook.com" class="link"><box-icon name='facebook' type='logo'></box-icon></a>
            <a href="https://linkedin.com" class="link"><box-icon name='linkedin' type='logo'></box-icon></a>
        </div>
        <div class="buttons">
            <button class="button">Hello</button>
            <button class="button">Goodbye</button>
        </div>
    </div>
</body>
</html>
